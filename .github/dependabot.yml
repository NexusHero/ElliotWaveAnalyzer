version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      # Microsoft.OpenApi 3.x makes IOpenApiMediaType.Example read-only, which the
      # Microsoft.AspNetCore.OpenApi 10.0.x XML-comment source generator still assigns
      # to (CS0200) — a major bump breaks the build. Hold on 2.x until the generator
      # supports 3.x; minor/patch 2.x updates are still allowed.
      - dependency-name: "Microsoft.OpenApi"
        update-types: ["version-update:semver-major"]
    groups:
      microsoft:
        patterns: ["Microsoft.*"]
      opentelemetry:
        patterns: ["OpenTelemetry.*"]

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      tanstack:
        patterns: ["@tanstack/*"]
      react:
        patterns: ["react", "react-dom", "@types/react*"]
