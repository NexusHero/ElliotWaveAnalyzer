name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  # ── Backend: self-contained binaries for all platforms ───────────────────
  publish-backend:
    name: Publish Backend (${{ matrix.rid }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - rid: linux-x64
            asset: ElliotWaveAnalyzer-linux-x64.zip
          - rid: win-x64
            asset: ElliotWaveAnalyzer-win-x64.zip
          - rid: osx-x64
            asset: ElliotWaveAnalyzer-osx-x64.zip

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Publish self-contained single-file binary
        run: >
          dotnet publish
          backend/src/ElliotWaveAnalyzer.Api/ElliotWaveAnalyzer.Api.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          --output release/${{ matrix.rid }}
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true

      - name: Include LICENSE and README in archive
        run: |
          cp LICENSE release/${{ matrix.rid }}/LICENSE
          cp README.md release/${{ matrix.rid }}/README.md
          cp backend/src/ElliotWaveAnalyzer.Api/appsettings.json \
             release/${{ matrix.rid }}/appsettings.json.example

      - name: Archive binary
        run: |
          cd release/${{ matrix.rid }}
          zip -r ../../${{ matrix.asset }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: backend-${{ matrix.rid }}
          path: ${{ matrix.asset }}
          retention-days: 7

  # ── Frontend: production build ────────────────────────────────────────────
  publish-frontend:
    name: Publish Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Type check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Build production bundle
        run: npm run build
        working-directory: frontend

      - name: Include LICENSE in dist
        run: cp LICENSE frontend/dist/LICENSE

      - name: Archive frontend dist
        run: |
          cd frontend/dist
          zip -r ../../ElliotWaveAnalyzer-frontend.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: frontend
          path: ElliotWaveAnalyzer-frontend.zip
          retention-days: 7

  # ── NuGet package (GitHub Packages) ──────────────────────────────────────
  publish-nuget:
    name: Publish NuGet Package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore backend

      - name: Build
        run: dotnet build backend --configuration Release --no-restore

      - name: Pack
        run: >
          dotnet pack
          backend/src/ElliotWaveAnalyzer.Api/ElliotWaveAnalyzer.Api.csproj
          --configuration Release
          --no-build
          --output nupkgs
          -p:PackageVersion=${{ github.ref_name }}
          -p:RepositoryUrl=https://github.com/NexusHero/ElliotWaveAnalyzer
          -p:PackageLicenseExpression=MIT

      - name: Push to GitHub Packages
        run: >
          dotnet nuget push nupkgs/*.nupkg
          --source "https://nuget.pkg.github.com/NexusHero/index.json"
          --api-key ${{ secrets.GITHUB_TOKEN }}
          --skip-duplicate

      - name: Upload .nupkg artifact
        uses: actions/upload-artifact@v5
        with:
          name: nuget-package
          path: nupkgs/*.nupkg
          retention-days: 30

  # ── GitHub Release with all artifacts ─────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-backend, publish-frontend, publish-nuget]

    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          # Extract the [Unreleased] section from CHANGELOG.md as release notes
          NOTES=$(awk '/^## \[Unreleased\]/{flag=1; next} /^## \[/{flag=0} flag' CHANGELOG.md)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "Elliott Wave Analyzer ${{ github.ref_name }}"
          body: |
            ## Elliott Wave Analyzer ${{ github.ref_name }}

            ${{ steps.changelog.outputs.notes }}

            ---

            ## Downloads

            | Platform | File |
            |----------|------|
            | Linux x64 | `ElliotWaveAnalyzer-linux-x64.zip` |
            | Windows x64 | `ElliotWaveAnalyzer-win-x64.zip` |
            | macOS x64 | `ElliotWaveAnalyzer-osx-x64.zip` |
            | Frontend (static) | `ElliotWaveAnalyzer-frontend.zip` |

            ### Quick Start

            1. Download the binary for your platform
            2. Extract the archive
            3. Copy `appsettings.json.example` → `appsettings.json`
            4. Set your API keys (`Gemini:ApiKey`, `MarketData:CoinGecko:ApiKey`)
            5. Run `./ElliotWaveAnalyzer.Api`
            6. Open `http://localhost:5000/swagger` to verify

            See the [README](https://github.com/NexusHero/ElliotWaveAnalyzer#readme) for full setup instructions.
          files: |
            artifacts/ElliotWaveAnalyzer-linux-x64.zip
            artifacts/ElliotWaveAnalyzer-win-x64.zip
            artifacts/ElliotWaveAnalyzer-osx-x64.zip
            artifacts/ElliotWaveAnalyzer-frontend.zip
            artifacts/*.nupkg
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: true
