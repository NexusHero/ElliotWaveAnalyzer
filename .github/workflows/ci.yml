name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Backend (.NET 10 / NUnit) ────────────────────────────────────────────
  backend:
    name: Backend — .NET 10
    runs-on: ubuntu-latest

    # PostgreSQL for the auth integration test (migrations + Npgsql round-trip).
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ewa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore
        working-directory: backend

      - name: Build
        run: dotnet build --no-restore --configuration Release
        working-directory: backend

      - name: Run tests with coverage
        run: >
          dotnet test
          --no-build
          --configuration Release
          --logger "console;verbosity=detailed"
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults
        working-directory: backend
        env:
          EWA_TEST_POSTGRES: "Host=localhost;Port=5432;Database=ewa_test;Username=postgres;Password=postgres"

      - name: Generate coverage report
        run: >
          dotnet tool install --global dotnet-reportgenerator-globaltool --ignore-failed-sources || true &&
          reportgenerator
          -reports:"backend/TestResults/**/coverage.cobertura.xml"
          -targetdir:"backend/TestResults/CoverageReport"
          -reporttypes:"Html;Cobertura;MarkdownSummaryGithub"
        continue-on-error: true

      - name: Post coverage summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: backend/TestResults/**/coverage.cobertura.xml
          badge: true
          format: markdown
          output: both
          # Target is 90% line coverage (ADR-007). Still advisory (continue-on-error)
          # until the CI-measured baseline confirms ≥90%, then flip to blocking.
          thresholds: '90 90'
        continue-on-error: true

      - name: Upload coverage
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: backend-coverage
          path: backend/TestResults/**/coverage.cobertura.xml
          if-no-files-found: error
          retention-days: 7

  # ── Frontend (React / TypeScript / Vitest) ───────────────────────────────
  frontend:
    name: Frontend — React/TypeScript
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Type check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Run tests
        run: npm test -- --reporter=verbose
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
