name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Backend (.NET 10 / NUnit) ────────────────────────────────────────────
  backend:
    name: Backend — .NET 10
    runs-on: ubuntu-latest

    # PostgreSQL for the auth integration test (migrations + Npgsql round-trip).
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ewa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore
        working-directory: backend

      - name: Build
        run: dotnet build --no-restore --configuration Release
        working-directory: backend

      - name: Run tests with coverage
        run: >
          dotnet test
          --no-build
          --configuration Release
          --logger "console;verbosity=detailed"
          --collect:"XPlat Code Coverage"
          --settings coverlet.runsettings
          --results-directory ./TestResults
        working-directory: backend
        env:
          # Run against the managed Postgres service container (production-near) instead of
          # spinning up throwaway Testcontainers: EWA_TEST_POSTGRES drives the auth integration
          # test, ACCEPTANCE_PG_CONNSTRING routes every acceptance test (each fixture isolated in
          # its own schema) at the same instance.
          EWA_TEST_POSTGRES: "Host=localhost;Port=5432;Database=ewa_test;Username=postgres;Password=postgres"
          ACCEPTANCE_PG_CONNSTRING: "Host=localhost;Port=5432;Database=ewa_test;Username=postgres;Password=postgres"

      - name: Generate coverage report
        run: >
          dotnet tool install --global dotnet-reportgenerator-globaltool --ignore-failed-sources || true &&
          reportgenerator
          -reports:"backend/TestResults/**/coverage.cobertura.xml"
          -targetdir:"backend/TestResults/CoverageReport"
          -reporttypes:"Html;Cobertura;MarkdownSummaryGithub"
        continue-on-error: true

      - name: Post coverage summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: backend/TestResults/**/coverage.cobertura.xml
          badge: true
          format: markdown
          output: both
          # Advisory PR comment / badge only. The blocking gate is the next step, which
          # enforces line coverage precisely (this action's fail_below_threshold would also
          # trip on branch rate, a separate metric we do not gate on — ADR-015).
          thresholds: '90 90'
        continue-on-error: true

      - name: Enforce line-coverage gate (≥90%)
        shell: bash
        run: |
          python3 - <<'PY'
          import glob, sys, xml.etree.ElementTree as ET
          files = glob.glob("backend/TestResults/**/coverage.cobertura.xml", recursive=True)
          if not files:
              sys.exit("No cobertura coverage file found")
          rate = float(ET.parse(files[0]).getroot().get("line-rate"))
          pct = rate * 100
          gate = 90.0
          print(f"Line coverage: {pct:.2f}% (gate {gate:.0f}%)")
          if pct + 1e-9 < gate:
              sys.exit(f"::error::Line coverage {pct:.2f}% is below the {gate:.0f}% gate (ADR-007 / ADR-015)")
          PY

      - name: Upload coverage
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: backend-coverage
          path: backend/TestResults/**/coverage.cobertura.xml
          if-no-files-found: error
          retention-days: 7

  # ── Frontend (React / TypeScript / Vitest) ───────────────────────────────
  frontend:
    name: Frontend — React/TypeScript
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Type check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Run tests
        run: npm test -- --reporter=verbose
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  # ── Docker image (production artifact) ───────────────────────────────────
  # Builds the production image on every PR/push so the Dockerfile can't silently break.
  # Build-only (no registry push, no secrets); flip `push` + add a login step to publish.
  docker:
    name: Docker image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: elliotwaveanalyzer-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
