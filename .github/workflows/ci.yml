name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Backend (.NET 10 / NUnit) ────────────────────────────────────────────
  backend:
    name: Backend — .NET 10
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore
        working-directory: backend

      - name: Build
        run: dotnet build --no-restore --configuration Release
        working-directory: backend

      - name: Run tests with coverage
        run: >
          dotnet test
          --no-build
          --configuration Release
          --logger "console;verbosity=detailed"
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults
        working-directory: backend

      - name: Generate coverage report
        run: >
          dotnet tool install --global dotnet-reportgenerator-globaltool --ignore-failed-sources || true &&
          reportgenerator
          -reports:"backend/TestResults/**/coverage.cobertura.xml"
          -targetdir:"backend/TestResults/CoverageReport"
          -reporttypes:"Html;Cobertura;MarkdownSummaryGithub"
        continue-on-error: true

      - name: Post coverage summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: backend/TestResults/**/coverage.cobertura.xml
          badge: true
          format: markdown
          output: both
          thresholds: '60 80'
        continue-on-error: true

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/tests/**/coverage.cobertura.xml
          retention-days: 7

  # ── Frontend (React / TypeScript / Vitest) ───────────────────────────────
  frontend:
    name: Frontend — React/TypeScript
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Type check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Run tests
        run: npm test -- --reporter=verbose
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
